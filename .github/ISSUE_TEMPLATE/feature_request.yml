name: Feature request
description: Suggest a new feature or enhancement.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is the problem you are trying to solve? What pain are you feeling today?
      placeholder: Today I cannot do X, which means …
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like Spotnik to behave?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why they fall short.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, links, related issues, Spotify Web API references, etc.
