name: Bug report
description: Something is broken or behaves unexpectedly.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in as much detail as you can.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I press X, Spotnik does Y instead of Z.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps that trigger the bug.
      placeholder: |
        1. Run `spotnik`
        2. Press `…`
        3. Observe …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      placeholder: I expected Spotnik to …
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Spotnik version
      description: Output of `spotnik --version` (or commit SHA if built from source).
      placeholder: 0.1.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux (amd64)
        - Linux (arm64)
        - Windows
    validations:
      required: true
  - type: input
    id: terminal
    attributes:
      label: Terminal emulator
      placeholder: e.g. iTerm2 3.5, Alacritty 0.13, Windows Terminal 1.20
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Run with `DEBUG=1 spotnik` and paste relevant output from `debug.log`. Screenshots help for TUI rendering bugs.
      render: shell
