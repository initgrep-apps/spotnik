# Release workflow — fires when a v* tag is pushed.
# GoReleaser builds 5 platform binaries, creates a GitHub Release,
# pushes the Homebrew formula and Scoop manifest, and uploads DEB/RPM packages.
# Prerequisite: RELEASE_PAT secret must exist (see docs/GITHUB-SETUP.md).
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code (full history for GoReleaser)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
