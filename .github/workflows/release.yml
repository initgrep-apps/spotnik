# Release workflow — fires when a v* tag is pushed.
# GoReleaser builds 5 platform binaries, creates a GitHub Release, and uploads
# DEB/RPM packages. After GoReleaser runs, actions/attest@v4 generates a
# Sigstore-signed SLSA Build Provenance v1.0 attestation per artifact, published
# to GitHub's attestation API and verifiable with `gh attestation verify`.
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write          # create the GitHub Release and upload artifacts
  id-token: write          # OIDC token for Sigstore keyless signing
  attestations: write      # publish attestations to GitHub's attestation API

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code (full history for GoReleaser)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest build provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-checksums: ./dist/checksums.txt
