# CI workflow — runs on every push and on PRs targeting main.
# Executes the full make ci gate: fmt-check, tidy-check, lint, test-coverage,
# check-glyphs, build.
name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          # Reads go directive from go.mod automatically.
          go-version-file: go.mod
          cache: true

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/6008b81b81c690c046ffc3fd5bce896da715d5fd/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v2.11.3

      - name: Run make ci
        run: make ci

      - name: Glyph fallback guards
        run: make check-glyphs

  tests-locale:
    name: CI (${{ matrix.locale }} locale)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        locale: [en_US.UTF-8, C]
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/6008b81b81c690c046ffc3fd5bce896da715d5fd/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v2.11.3

      - name: Run full CI with LANG=${{ matrix.locale }}
        run: LANG=${{ matrix.locale }} make ci
