name: installer-tests

# Principle of least privilege: tests only need to read the repo. No
# release/issue/PR mutation, no OIDC, no attestations.
permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - 'install.sh'
      - 'install.ps1'
      - 'uninstall.sh'
      - 'uninstall.ps1'
      - 'tests/installer/**'
      - '.github/workflows/installer-tests.yml'
  pull_request:
    paths:
      - 'install.sh'
      - 'install.ps1'
      - 'uninstall.sh'
      - 'uninstall.ps1'
      - 'tests/installer/**'
      - '.github/workflows/installer-tests.yml'

jobs:
  linux:
    name: linux-docker-matrix
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Run Docker matrix
        run: make test-installer

  macos:
    name: macos-direct
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install bats
        run: brew install bats-core
      # bats helpers (tests/installer/bats/helpers.bash) hard-code
      # bash "$HOME/install.sh" — stage scripts in a clean fake HOME so the
      # macOS direct-run path matches the Docker layout AND avoids residue
      # from the runner image's pre-populated $HOME (.zshrc, etc.).
      - name: Stage installer scripts in clean HOME
        run: |
          mkdir -p "$RUNNER_TEMP/fakehome"
          cp install.sh uninstall.sh "$RUNNER_TEMP/fakehome/"
      - name: Run bats suite
        env:
          HOME: ${{ runner.temp }}/fakehome
        run: |
          bats tests/installer/bats

  windows:
    name: windows-pester
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Run Pester suite
        shell: pwsh
        run: |
          Install-Module -Name Pester -Force -Scope CurrentUser -SkipPublisherCheck
          Import-Module Pester
          $config = New-PesterConfiguration
          $config.Run.Path = 'tests/installer/pester'
          $config.Run.Throw = $true
          Invoke-Pester -Configuration $config
