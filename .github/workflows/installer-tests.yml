name: installer-tests

on:
  push:
    branches: [main]
    paths:
      - 'install.sh'
      - 'install.ps1'
      - 'uninstall.sh'
      - 'uninstall.ps1'
      - 'tests/installer/**'
      - '.github/workflows/installer-tests.yml'
  pull_request:
    paths:
      - 'install.sh'
      - 'install.ps1'
      - 'uninstall.sh'
      - 'uninstall.ps1'
      - 'tests/installer/**'
      - '.github/workflows/installer-tests.yml'

jobs:
  linux:
    name: linux-docker-matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Docker matrix
        run: make test-installer

  macos:
    name: macos-direct
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: brew install bats-core
      - name: Stage installer scripts
        run: cp install.sh uninstall.sh /Users/runner/
      - name: Run bats suite
        env:
          HOME: /Users/runner
        run: |
          bats tests/installer/bats

  windows:
    name: windows-pester
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Pester suite
        shell: pwsh
        run: |
          Install-Module -Name Pester -Force -Scope CurrentUser -SkipPublisherCheck
          Import-Module Pester
          $config = New-PesterConfiguration
          $config.Run.Path = 'tests/installer/pester'
          $config.Run.Throw = $true
          Invoke-Pester -Configuration $config
